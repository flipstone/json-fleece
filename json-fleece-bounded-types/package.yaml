name:                json-fleece-bounded-types
version:             0.1.0.0
github:              "flipstone/json-fleece/json-fleece-bounded-types"
license:             MIT
license-file:        LICENSE
author:              Flipstone Technology Partners
copyright:           2026 Flipstone Technology Partners
maintainer:          maintainers@flipstone.com

description:         Please see the README on GitHub at <https://github.com/flipstone/json-fleece-bounded-types#readme>
tested-with:
    GHC == 9.4.8, GHC == 9.6.7, GHC == 9.8.4, GHC == 9.10.2

dependencies:
  - base >= 4.7 && < 5
  - json-fleece-core >= 0.11.1 && < 0.12

flags:
  strict:
    description: More strict ghc options used for development and ci, not intended for end-use.
    manual: true
    default: false

when:
  - condition: flag(strict)
    then:
      ghc-options:
        - -Weverything
        - -Werror
        - -Wno-missing-local-signatures
        - -Wno-monomorphism-restriction
        - -Wno-missing-kind-signatures
        - -Wno-prepositive-qualified-module
        - -Wno-implicit-prelude
        - -Wno-safe
        - -Wno-unsafe
        - -Wno-missing-safe-haskell-mode
        - -Wno-missing-deriving-strategies
        - -Wno-all-missed-specialisations
        - -Wno-missed-specialisations
        - -Wno-unticked-promoted-constructors
      when:
        - condition: impl (ghc >= 9.8)
          ghc-options:
            - -Wno-missing-role-annotations
            - -Wno-missing-poly-kind-signatures
        - condition: impl (ghc >= 9.10)
          ghc-options:
            - -Wno-defaulted-exception-context
    else:
      ghc-options:
        - -Wall

library:
  source-dirs: src
  exposed-modules:
    - Fleece.BoundedTypes
  dependencies:
    - bounded-text >= 0.1.1 && < 0.2
    - nonempty-containers >= 0.3.4 && < 0.4
    - text >= 1.2 && < 2.2

tests:
  json-fleece-bounded-types-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - json-fleece-bounded-types
      - json-fleece-core
      - json-fleece-markdown
      - tasty
      - tasty-golden
      - text
